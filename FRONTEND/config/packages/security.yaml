security:
    # Hachage des mots de passe
    password_hashers:
        App\Entity\utilisateur\Utilisateur: 'auto'
        # Pour les tests, on garde aussi le hasher par défaut
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Fournisseurs d'utilisateurs
    providers:
        # Utilise notre entité Utilisateur depuis la base de données
        app_user_provider:
            entity:
                class: App\Entity\utilisateur\Utilisateur
                property: email
        
        # Garder le provider in_memory pour les tests (optionnel)
        users_in_memory:
            memory: null

    # Firewalls (zones sécurisées)
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        main:
            lazy: true
            provider: app_user_provider  # ← Utilise notre entité Utilisateur
            
            # Formulaire de connexion
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                username_parameter: email
                password_parameter: password
                enable_csrf: true
            
            # Déconnexion
            logout:
                path: app_logout
                target: app_home
                invalidate_session: true
            
            # Se souvenir de l'utilisateur
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800  # 7 jours
                path: /
                always_remember_me: true
            
            # Pour les tests uniquement (optionnel)
            # http_basic: ~

    # Contrôle d'accès
    access_control:
        # Pages publiques
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/about, roles: PUBLIC_ACCESS }
        - { path: ^/contact, roles: PUBLIC_ACCESS }
        - { path: ^/services, roles: PUBLIC_ACCESS }
        - { path: ^/tech, roles: PUBLIC_ACCESS }
        - { path: ^/maintenance, roles: PUBLIC_ACCESS }
        - { path: ^/evenements, roles: PUBLIC_ACCESS }
        - { path: ^/suivi-animal, roles: PUBLIC_ACCESS }
        - { path: ^/achat-equipement, roles: PUBLIC_ACCESS }
        - { path: ^/ventes-depenses, roles: PUBLIC_ACCESS }
        
        # Pages d'authentification
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        
        # Pages protégées
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/profil, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # Par défaut, les hashers sont gourmands en ressources. Pour les tests, on réduit le coût
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10