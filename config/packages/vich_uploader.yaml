vich_uploader:
    db_driver: orm
    metadata:
        type: attribute
    mappings:
        equipement_images:
            uri_prefix: /uploads/equipements
            upload_destination: '%kernel.project_dir%/public/uploads/equipements'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
            delete_on_remove: true
